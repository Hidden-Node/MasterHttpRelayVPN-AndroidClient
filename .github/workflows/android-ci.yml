name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK 26.3.11579264
        run: sdkmanager "ndk;26.3.11579264"

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Build Rust core + tun2socks artifacts
        run: bash ./android/build_rust_mobile.sh

      - name: Build Debug APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --stacktrace

      - name: List APK outputs
        run: ls -la android/app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-splits
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Rust Android binaries
        uses: actions/upload-artifact@v4
        with:
          name: mhrv-rs-android-binaries
          path: |
            android/app/src/main/assets/arm64-v8a/mhrv-rs
            android/app/src/main/assets/armeabi-v7a/mhrv-rs
            android/app/src/main/assets/x86_64/mhrv-rs
