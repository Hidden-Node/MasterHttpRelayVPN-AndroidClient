name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            android/rust-jni-bridge/target
          key: cargo-android-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'android/rust-jni-bridge/Cargo.toml') }}
          restore-keys: |
            cargo-android-${{ runner.os }}-

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-android-${{ runner.os }}-${{ hashFiles('android/mobilebridge/go.sum') }}
          restore-keys: |
            go-android-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK 26.3.11579264
        run: sdkmanager "ndk;26.3.11579264"

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Ensure scripts are executable
        run: chmod +x android/build_rust_mobile.sh android/app/scripts/*.sh

      - name: Build JNI bridge + tun2socks artifacts
        run: bash ./android/build_rust_mobile.sh

      - name: Build Debug APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-splits
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload JNI bridge libraries
        uses: actions/upload-artifact@v4
        with:
          name: rust-jni-bridge-libs
          path: |
            android/app/src/main/jniLibs/arm64-v8a/librust_jni_bridge.so
            android/app/src/main/jniLibs/armeabi-v7a/librust_jni_bridge.so
            android/app/src/main/jniLibs/x86_64/librust_jni_bridge.so
