name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (example: v1.0.0)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional)'
        required: false
        type: string
      make_latest:
        description: 'Mark as latest release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.5'

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK 26.3.11579264
        run: sdkmanager "ndk;26.3.11579264"

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.jks
          ls -la android/release.jks

      - name: Build Rust core + tun2socks artifacts
        run: bash ./android/build_rust_mobile.sh

      - name: Derive Android app version from tag
        run: |
          TAG="${{ inputs.tag_name }}"
          VERSION_NAME="${TAG#v}"
          if [[ ! "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag_name must be SemVer like v1.2.3"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "Using ANDROID_VERSION_NAME=$VERSION_NAME ANDROID_VERSION_CODE=$VERSION_CODE"

      - name: Build Signed Release APKs (split + universal)
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_SIGNING_ENABLED: "true"
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
        run: chmod +x gradlew && ./gradlew :app:assembleRelease --stacktrace

      - name: Prepare release files
        run: |
          mkdir -p release-artifacts
          APP_NAME="masterhttprelayvpn"
          VERSION_NAME="${ANDROID_VERSION_NAME}"

          if [ -f android/app/libs/tun2socks.aar ]; then
            cp android/app/libs/tun2socks.aar release-artifacts/${APP_NAME}-${VERSION_NAME}-tun2socks.aar
          fi

          for apk in android/app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk")
            if [[ "$filename" == "app-universal-release.apk" ]]; then
              suffix="universal"
            else
              suffix=$(echo "$filename" | sed -E 's|^app-(.*)-release\.apk$|\1|')
            fi
            cp "$apk" "release-artifacts/${APP_NAME}-${VERSION_NAME}-${suffix}-release.apk"
          done

          cp android/app/src/main/assets/arm64-v8a/mhrv-rs release-artifacts/${APP_NAME}-${VERSION_NAME}-arm64-v8a-mhrv-rs
          cp android/app/src/main/assets/armeabi-v7a/mhrv-rs release-artifacts/${APP_NAME}-${VERSION_NAME}-armeabi-v7a-mhrv-rs
          cp android/app/src/main/assets/x86_64/mhrv-rs release-artifacts/${APP_NAME}-${VERSION_NAME}-x86_64-mhrv-rs

          ls -la release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
          generate_release_notes: true
          make_latest: ${{ inputs.make_latest && 'true' || 'false' }}
          files: |
            release-artifacts/*
